services:
  db:
    image: postgres:16-alpine
    container_name: reloop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reloop
      POSTGRES_PASSWORD: reloop
      POSTGRES_DB: reloop
    ports:
      - "5432:5432"
    volumes:
      - reloop-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reloop -d reloop"]
      interval: 5s
      timeout: 5s
      retries: 10

  realtime:
    image: node:22-alpine
    container_name: reloop-realtime
    working_dir: /app
    command: ["node", "realtime/server.mjs"]
    restart: unless-stopped
    environment:
      REALTIME_PORT: "3001"
      REALTIME_HOST: "0.0.0.0"
      REALTIME_INTERNAL_SECRET: "${REALTIME_INTERNAL_SECRET:-reloop-dev-realtime-secret}"
    ports:
      - "3001:3001"
    volumes:
      - ./:/app:ro

volumes:
  reloop-db-data:
