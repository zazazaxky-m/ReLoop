name: reloop_mobile
description: "Aplikasi mobile ReLoop untuk Android dan iOS."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.5.0
  intl: ^0.20.2
  mobile_scanner: ^7.1.3
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.2.0
  flutter_secure_storage: ^9.2.4
  go_router: ^14.8.1
  provider: ^6.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  path_provider: ^2.1.5
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  mime: ^1.0.6
  local_auth: ^2.3.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  flutter_dotenv: ^5.2.1
  smooth_page_indicator: ^1.2.0+3
  share_plus: ^10.1.4
  flutter_svg: ^2.0.17
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.4
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - .env.development
    - .env.staging
    - .env.production
    - assets/icon/
    - assets/images/
